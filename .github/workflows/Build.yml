name: Build
on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write
      
    steps:
      - name: Add safe.directory Update libnx
        run: |
          git config --global --add safe.directory "*"
          git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          cd libnx
          make -j$(nproc) install

      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Extract version
        run: |
          APP_NAME="Atmosphère"
          VER_FILE="libraries/libvapours/include/vapours/ams/ams_api_version.h"
          KEY="#define ATMOSPHERE_RELEASE_VERSION_"

          VERSION="$(grep -F "$KEY" "$VER_FILE" | grep -oE '[0-9]+' | head -3 | paste -s -d '.')"
          SHORT_HASH="$(git rev-parse --short=9 HEAD)"
          echo "TAG_NAME=v${VERSION}-${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${APP_NAME} v${VERSION} (${SHORT_HASH})" >> "$GITHUB_ENV"

      - name: Build
        run: |
          make -f atmosphere.mk dist-no-debug

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: |
            out/nintendo_nx_arm64_armv8a/release/atmosphere*.zip
            out/nintendo_nx_arm64_armv8a/release/fusee.bin
